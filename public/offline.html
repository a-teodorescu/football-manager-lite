<!doctype html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#16a34a" />
    <title>Football Manager Lite — Offline</title>
    <style>
      :root { color-scheme: dark; font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f172a; color: #e2e8f0; }
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 24px; }
      main { max-width: 560px; border: 1px solid rgba(148, 163, 184, 0.3); border-radius: 24px; padding: 28px; background: rgba(15, 23, 42, 0.86); box-shadow: 0 24px 70px rgba(0,0,0,0.35); }
      h1 { margin: 0 0 12px; font-size: clamp(2rem, 8vw, 3.5rem); }
      p { line-height: 1.6; color: #cbd5e1; }
      .badge { display: inline-flex; padding: 6px 10px; border-radius: 999px; background: #16a34a; color: white; font-weight: 800; font-size: 0.8rem; letter-spacing: 0.04em; text-transform: uppercase; }
      button { margin-top: 16px; border: 0; border-radius: 999px; padding: 12px 18px; font-weight: 800; background: #e2e8f0; color: #0f172a; cursor: pointer; }
    </style>
  </head>
  <body>
    <main>
      <span class="badge">Offline mode</span>
      <h1>Football Manager Lite</h1>
      <p>Nu ai conexiune la internet. Aplicatia poate folosi salvarea locala, dar Supabase Auth si cloud save au nevoie de internet.</p>
      <p>Revino online, apoi apasa Reload ca sa sincronizezi.</p>
      <button onclick="window.location.reload()">Reload</button>
    </main>
  </body>
</html>
